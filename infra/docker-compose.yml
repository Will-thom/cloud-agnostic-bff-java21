version: "3.9"

services:

  order-service:
    build: ../order-service
    container_name: order-service
    ports:
      - "8081:8081"

  payment-service:
    build: ../payment-service
    container_name: payment-service
    ports:
      - "8082:8082"

  delivery-service:
    build: ../delivery-service
    container_name: delivery-service
    ports:
      - "8083:8083"

  bff-service:
    build: ../bff-service
    container_name: bff-service
    ports:
      - "8080:8080"
    depends_on:
      - order-service
      - payment-service
      - delivery-service
    environment:
      # O BFF deve chamar os serviços pelos nomes dos containers
      ORDER_SERVICE_URL: http://order-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8082
      DELIVERY_SERVICE_URL: http://delivery-service:8083